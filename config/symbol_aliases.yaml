# config/symbol_aliases.yaml
# ---------------------------------------------------------------------------
# NSE symbol → list of lowercase text aliases for news article matching.
# Used by: news/sentiment.py (Phase 5)
# Rules:
#   - All alias strings must be lowercase
#   - Each symbol has 2–4 aliases covering common press variations
#     (full company name, short name, brand name, ticker-as-text)
#   - Trailing spaces on short tickers (e.g. "ril ") prevent false matches
#     inside longer words.  Add them intentionally where ambiguity exists.
# ---------------------------------------------------------------------------

