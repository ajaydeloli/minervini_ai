# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────────────────────
# Minervini SEPA — Continuous Integration
#
# Runs on every push and pull-request to main / master.
#
# Jobs
# ────
#   lint    — ruff check + ruff format --check
#   test    — pytest unit tests with coverage (slow tests excluded)
#   slow    — pytest slow-marked tests (rate-limit burst test, etc.)
#             runs only on push to main/master, not on PRs
#
# Coverage report is uploaded to Codecov (token optional — public repos
# don't need one; set CODECOV_TOKEN secret for private repos).
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Lint & format check
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — Unit tests (fast path, no slow-marked tests)
# ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e ".[dev]"

      - name: Run unit tests (exclude slow)
        run: |
          python -m pytest tests/unit/ \
            -v --tb=short \
            -m "not slow" \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: .
          # Minimal env so modules that read .env don't crash — no real keys needed
          # (all external calls are mocked in unit tests)
          GROQ_API_KEY: "test-key"
          TELEGRAM_BOT_TOKEN: "0:test"
          TELEGRAM_CHAT_ID: "0"
          API_READ_KEY: "test-read"
          API_ADMIN_KEY: "test-admin"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — Slow tests (rate-limit burst, etc.)
#          Only on push to main/master — skip on PRs to keep feedback fast.
# ──────────────────────────────────────────────────────────────────────────────
  slow-tests:
    name: Slow Tests
    runs-on: ubuntu-latest
    needs: test
    # Only run on direct push to main/master, not on PRs
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e ".[dev]"

      - name: Run slow-marked tests
        run: |
          python -m pytest tests/unit/ \
            -v --tb=short \
            -m "slow" \
            --timeout=120
        env:
          PYTHONPATH: .
          GROQ_API_KEY: "test-key"
          TELEGRAM_BOT_TOKEN: "0:test"
          TELEGRAM_CHAT_ID: "0"
          API_READ_KEY: "test-read"
          API_ADMIN_KEY: "test-admin"
